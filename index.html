<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CVDmeme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Bienvenue dans CVDmeme 🎉</h1>

    <div id="ecranAccueil">
        <input type="text" id="pseudo" placeholder="Ton pseudo">
        <input type="text" id="codeSalle" placeholder="Code de la salle">
        <button onclick="rejoindreSalle()">Rejoindre / Créer</button>
        <p id="message"></p>
    </div>

    <div id="ecranSalle" style="display: none;">
        <h2>Salle : <span id="affichageCodeSalle"></span></h2>
        <h3>Joueurs :</h3>
        <ul id="listeJoueurs"></ul>
        <button onclick="demarrerPartie()">Démarrer la partie</button>
    </div>

    <div id="ecranEcriture" style="display: none;">
        <h2>Écris une phrase drôle !</h2>
        <input type="text" id="phrase" placeholder="Ta phrase">
        <button onclick="envoyerPhrase()">Valider</button>
        <p id="messageEcriture"></p>
        <p id="statutEcriture"></p>
    </div>

    <div id="ecranPhraseRecue" style="display: none;">
        <h2>Voici la phrase à illustrer :</h2>
        <p id="affichagePhraseRecue"></p>

        <input type="text" id="lienImage" placeholder="Colle un lien d'image ou de GIF ici">
        <button onclick="validerVisuel()">Valider ce visuel</button>
        <p id="messageVisuel"></p>

        <div id="apercuVisuel"></div>
    </div>

    <div id="ecranReveal" style="display: none;">
        <h2>Reveal !</h2>
        <p id="revealPhrase"></p>
        <div id="revealVisuel"></div>

        <div id="zoneVote">
            <p>Note ce visuel :</p>
            <button onclick="voter(1)">⭐1</button>
            <button onclick="voter(2)">⭐2</button>
            <button onclick="voter(3)">⭐3</button>
            <button onclick="voter(4)">⭐4</button>
            <button onclick="voter(5)">⭐5</button>
        </div>
        <p id="messageVote"></p>
        <p id="statutVote"></p>

        <button onclick="forcerSuite()">Forcer la suite</button>
        <p id="revealCompteur"></p>
    </div>

    <div id="ecranClassement" style="display: none;">
        <h2>Classement final 🏆</h2>
        <ol id="listeClassement"></ol>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
